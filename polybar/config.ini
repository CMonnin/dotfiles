[colors]
bg       = #282828
fg       = #ebdbb2
yellow   = #d79921
orange   = #d65d0e
red      = #cc241d
green    = #98971a
blue     = #458588
purple   = #b16286
aqua     = #689d6a
gray     = #a89984
darkgray = #1d2021

[bar/main]
width      = 100%
height     = 27
bottom     = true
background = ${colors.bg}
foreground = ${colors.fg}

font-0 = terminus:size=14:antialias=true

padding-left  = 1
padding-right = 1
module-margin = 1

modules-left   = bspwm
modules-center = date
modules-right  = network cpu battery volume 

wm-restack = bspwm

[module/bspwm]
type = internal/bspwm

label-focused            = %name%
label-focused-background = ${colors.yellow}
label-focused-foreground = ${colors.bg}
label-focused-padding    = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.blue}
label-occupied-padding    = 1

label-urgent            = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg}
label-urgent-padding    = 1

label-empty            = %name%
label-empty-foreground = ${colors.gray}
label-empty-padding    = 1

[module/date]
type     = internal/date
interval = 1
date     = %Y-%m-%d
time     = %H:%M:%S
label    = %{F#98971a}%date%%{F-}  %{F#d79921}%time%%{F-}

[module/cpu]
type     = internal/cpu
interval = 1
label    = %{F#cc241d}CPU%{F-} %percentage%%

[module/volume]
type          = internal/pulseaudio
label-volume  = %{F#b16286}VOL%{F-} %percentage%%
label-muted   = %{F#a89984}MUTE%{F-}

[module/battery]
type               = internal/battery
battery            = BAT0
adapter            = AC
full-at            = 98
label-charging     = %{F#98971a}CHG%{F-} %percentage%%
label-discharging  = %{F#d79921}BAT%{F-} %percentage%%
label-full         = %{F#98971a}FULL%{F-}

[module/network]
type      = internal/network
interface = wlp0s20f3
interval  = 2

label-connected    = %{F#689d6a}%essid%%{F-}  %{F#458588}↓%downspeed%%{F-}  %{F#d65d0e}↑%upspeed%%{F-}
label-disconnected = %{F#cc241d}no network%{F-}
